<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    <!-- 定义用于科技感的霓虹渐变 -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#2979FF" />
    </linearGradient>

    <!-- 定义柔和的发光效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景（透明，适合深色主题） -->

  <!-- 1. 六边形背景（网络/后端节点） -->
  <g id="hexagon" filter="url(#glow)">
    <polygon 
      points="90,50 70,84.6 30,84.6 10,50 30,15.4 70,15.4" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="3" 
      stroke-linejoin="round" 
    />
  </g>

  <!-- 2. 网格线（结构化的 Protocol Buffers 数据） -->
  <g id="grid-lines" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5">
    <!-- 对角线 -->
    <line x1="70" y1="15.4" x2="30" y2="84.6" />
    <line x1="30" y1="15.4" x2="70" y2="84.6" />
    <!-- 水平中线 -->
    <line x1="10" y1="50" x2="90" y2="50" />
    <!-- 垂直中线 -->
    <line x1="50" y1="10" x2="50" y2="90" />
  </g>

  <!-- 3. UI 窗口界面 -->
  <g id="ui-window">
    <!-- 窗口主体 -->
    <rect 
      x="25" y="30" 
      width="50" height="50" 
      rx="4" 
      fill="none" 
      stroke="rgba(255, 255, 255, 0.4)" 
      stroke-width="1.5" 
    />
    <!-- 标题栏分隔线 -->
    <line x1="25" y1="42" x2="75" y2="42" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
    <!-- macOS 风格的窗口控制点 -->
    <circle cx="32" cy="36" r="1.5" fill="#FF5F56" />
    <circle cx="38" cy="36" r="1.5" fill="#FFBD2E" />
    <circle cx="44" cy="36" r="1.5" fill="#27C93F" />
  </g>

  <!-- 4. 播放按钮（客户端 RPC 调用） -->
  <g id="play-button" filter="url(#glow)">
    <path 
      d="M 45,50 L 60,58 L 45,66 Z" 
      fill="url(#neonGradient)" 
    />
  </g>
</svg>